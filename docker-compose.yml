services:
  ia-audit:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      - MONGODB_URI=mongodb://host.docker.internal:27017/aria-audit
    extra_hosts:
      - "host.docker.internal:host-gateway"
